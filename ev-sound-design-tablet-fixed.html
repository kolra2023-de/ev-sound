<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EV · Active Sound Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --void: #0A0E1A;
      --panel: #0D1F3C;
      --surface: #112044;
      --border: rgba(0, 212, 255, 0.12);
      --electric: #00D4FF;
      --sub: #7B2FFF;
      --muted: rgba(0, 212, 255, 0.45);
      --text: #C8E6FF;
      --dim: rgba(200, 230, 255, 0.4);
    }

    body {
      background: var(--void);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* ---------- header ---------- */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header .eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      color: var(--electric);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .header h1 {
      font-size: 1.5rem;
      font-weight: 300;
      letter-spacing: 0.06em;
      color: var(--text);
    }
    .header h1 span { color: var(--electric); font-weight: 500; }

    /* ---------- main card ---------- */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 1.25rem;
      padding: 2rem;
      width: 100%;
      max-width: 520px;
      position: relative;
      box-shadow: 0 0 60px rgba(0,212,255,0.05), 0 24px 48px rgba(0,0,0,0.6);
    }

    /* ---------- oscilloscope ring ---------- */
    .ring-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
      position: relative;
    }
    .ring-canvas {
      width: 220px;
      height: 220px;
      border-radius: 50%;
    }
    .ring-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
    }
    .ring-speed {
      font-family: 'JetBrains Mono', monospace;
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1;
      color: var(--electric);
      text-shadow: 0 0 20px rgba(0,212,255,0.7);
      transition: color 0.3s;
    }
    .ring-unit {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-top: 0.2rem;
    }
    .ring-state {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-top: 0.3rem;
    }

    /* ---------- data row ---------- */
    .data-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
    }
    .data-cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.6rem;
      padding: 0.65rem 0.75rem;
    }
    .data-cell .label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .data-cell .value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }
    .data-cell .value.accent { color: var(--electric); }
    .data-cell .value.sub-accent { color: #A87AFF; }

    /* ---------- slider section ---------- */
    .slider-section { margin-bottom: 1.5rem; }
    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 0.6rem;
    }
    .slider-label span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      text-transform: uppercase;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 4px;
      background: var(--surface);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      position: relative;
      touch-action: manipulation;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--electric);
      box-shadow: 0 0 12px rgba(0,212,255,0.8);
      cursor: pointer;
      transition: transform 0.1s;
    }
    input[type=range]:active::-webkit-slider-thumb { transform: scale(1.2); }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--electric);
      box-shadow: 0 0 12px rgba(0,212,255,0.8);
      border: none; cursor: pointer;
    }
    .track-fill-wrap {
      position: relative;
      width: 100%;
    }
    .track-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 0.4rem;
    }
    .track-labels span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      color: var(--dim);
    }

    /* ---------- start button ---------- */
    .btn-start {
      width: 100%;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid var(--electric);
      border-radius: 0.6rem;
      color: var(--electric);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      touch-action: manipulation;
      transition: background 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }
    .btn-start:hover {
      background: rgba(0,212,255,0.08);
      box-shadow: 0 0 20px rgba(0,212,255,0.2);
    }
    .btn-start.active {
      background: rgba(0,212,255,0.12);
      border-color: var(--electric);
      color: var(--electric);
    }
    .btn-start .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--electric);
      margin-right: 0.5rem;
      vertical-align: middle;
      animation: none;
    }
    .btn-start.active .dot { animation: pulse-dot 1.2s ease-in-out infinite; }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; box-shadow: 0 0 4px rgba(0,212,255,0.8); }
      50% { opacity: 0.4; box-shadow: none; }
    }

    /* ---------- status bar ---------- */
    .status {
      margin-top: 1.25rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: var(--dim);
      text-align: center;
    }
    .status .ok { color: var(--electric); }
    .status .idle { color: #A87AFF; }

    /* ---------- waveform bars ---------- */
    .wave-bars {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      height: 32px;
      margin-top: 0.75rem;
    }
    .bar {
      width: 4px;
      background: var(--electric);
      border-radius: 2px 2px 0 0;
      opacity: 0.6;
      transition: height 0.1s;
    }

    @media (prefers-reduced-motion: reduce) {
      .btn-start.active .dot { animation: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <p class="eyebrow">Anthropic · EV Systems</p>
  <h1>Active <span>Sound Design</span></h1>
</div>

<div class="card">

  <!-- Oscilloscope ring -->
  <div class="ring-wrap">
    <canvas class="ring-canvas" id="ringCanvas" width="220" height="220"></canvas>
    <div class="ring-center">
      <div class="ring-speed" id="speedDisplay">0</div>
      <div class="ring-unit">km/h</div>
      <div class="ring-state" id="stateLabel">IDLE</div>
    </div>
  </div>

  <!-- Live data cells -->
  <div class="data-row">
    <div class="data-cell">
      <div class="label">Main Hz</div>
      <div class="value accent" id="mainHz">60</div>
    </div>
    <div class="data-cell">
      <div class="label">Sub Hz</div>
      <div class="value sub-accent" id="subHz">30</div>
    </div>
    <div class="data-cell">
      <div class="label">Volume</div>
      <div class="value" id="volVal">2%</div>
    </div>
  </div>

  <!-- Waveform bars -->
  <div class="wave-bars" id="waveBars"></div>

  <!-- Slider -->
  <div class="slider-section" style="margin-top:1.25rem;">
    <div class="slider-label">
      <span>속도 시뮬레이션</span>
      <span id="sliderReadout">0 km/h</span>
    </div>
    <div class="track-fill-wrap">
      <input type="range" id="speedSlider" min="0" max="150" value="0">
    </div>
    <div class="track-labels"><span>0</span><span>50</span><span>100</span><span>150</span></div>
  </div>

  <!-- Start button -->
  <button class="btn-start" id="startBtn">
    <span class="dot"></span>사운드 엔진 시작
  </button>

  <!-- Status -->
  <div class="status" id="statusBar">엔진 대기 중 — 시작 버튼을 눌러 활성화</div>
</div>

<script>
  /*
   * Tablet-safe audio engine.
   * The sound design itself is unchanged from the uploaded design file:
   * - main oscillator: sine
   * - sub oscillator: triangle through a 200 Hz low-pass filter
   * - identical pitch and gain formulas
   */
  let audioCtx = null;
  let mainOsc = null;
  let subOsc = null;
  let mainGain = null;
  let subGain = null;
  let filter = null;
  let engineOn = false;
  let engineStarting = false;

  const AudioContextClass = window.AudioContext || window.webkitAudioContext;

  function setStatus(html) {
    document.getElementById('statusBar').innerHTML = html;
  }

  async function resumeAudioContext() {
    if (!audioCtx || audioCtx.state === 'closed') return;
    if (audioCtx.state === 'suspended' || audioCtx.state === 'interrupted') {
      await audioCtx.resume();
    }
  }

  function unlockTabletAudio() {
    if (!audioCtx) return;
    resumeAudioContext().catch(() => {});
  }

  function buildAudioGraph() {
    const t = audioCtx.currentTime;

    mainOsc = audioCtx.createOscillator();
    mainOsc.type = 'sine';
    mainGain = audioCtx.createGain();

    subOsc = audioCtx.createOscillator();
    subOsc.type = 'triangle';
    subGain = audioCtx.createGain();

    filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(200, t);

    mainOsc.connect(mainGain);
    mainGain.connect(audioCtx.destination);

    subOsc.connect(subGain);
    subGain.connect(filter);
    filter.connect(audioCtx.destination);

    mainGain.gain.setValueAtTime(0, t);
    subGain.gain.setValueAtTime(0, t);

    mainOsc.start(t);
    subOsc.start(t);
  }

  function unlockWithSilentBuffer() {
    // Some Android/iPad WebViews need a source node to start during the user's tap.
    // This one-sample silent buffer changes no audible sound.
    const buffer = audioCtx.createBuffer(1, 1, audioCtx.sampleRate || 44100);
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);
    source.start(0);
  }

  async function initAudio() {
    if (engineStarting) return;
    engineStarting = true;

    try {
      if (!AudioContextClass) {
        throw new Error('이 브라우저는 Web Audio를 지원하지 않습니다.');
      }

      if (!audioCtx || audioCtx.state === 'closed') {
        audioCtx = new AudioContextClass();
        unlockWithSilentBuffer();
        buildAudioGraph();
      }

      await resumeAudioContext();
      engineOn = true;

      const btn = document.getElementById('startBtn');
      btn.classList.add('active');
      btn.innerHTML = '<span class="dot"></span>사운드 엔진 활성';

      setStatus('<span class="ok">● ONLINE</span> — 슬라이더로 속도를 조정하세요');
      updateSpeed(document.getElementById('speedSlider').value);
    } catch (error) {
      engineOn = false;
      console.error(error);
      setStatus('<span style="color:#ff7b8a">● AUDIO ERROR</span> — 화면을 한 번 탭한 뒤 다시 시작하세요');
      const btn = document.getElementById('startBtn');
      btn.classList.remove('active');
      btn.innerHTML = '<span class="dot"></span>사운드 엔진 다시 시작';
    } finally {
      engineStarting = false;
    }
  }

  function updateSpeed(speed) {
    const s = Math.max(0, Math.min(150, parseFloat(speed) || 0));
    document.getElementById('speedDisplay').textContent = Math.round(s);
    document.getElementById('sliderReadout').textContent = Math.round(s) + ' km/h';

    let state = 'IDLE';
    if (s > 1 && s < 30) state = 'LOW';
    else if (s >= 30 && s < 80) state = 'CRUISE';
    else if (s >= 80 && s < 120) state = 'HIGH';
    else if (s >= 120) state = 'PEAK';
    document.getElementById('stateLabel').textContent = state;

    // Original sound formulas — intentionally unchanged.
    let mainPitch, subPitch, vol;
    if (s <= 1) {
      mainPitch = 60;
      subPitch = 30;
      vol = 0.02;
    } else {
      mainPitch = 80 + s * 3.5;
      subPitch = 40 + s * 1.8;
      vol = Math.min(0.02 + s / 400, 0.3);
    }

    document.getElementById('mainHz').textContent = Math.round(mainPitch);
    document.getElementById('subHz').textContent = Math.round(subPitch);
    document.getElementById('volVal').textContent = Math.round(vol * 100) + '%';

    if (audioCtx && mainOsc && subOsc && mainGain && subGain) {
      resumeAudioContext().catch(() => {});
      const t = audioCtx.currentTime;
      mainOsc.frequency.cancelScheduledValues(t);
      subOsc.frequency.cancelScheduledValues(t);
      mainGain.gain.cancelScheduledValues(t);
      subGain.gain.cancelScheduledValues(t);

      mainOsc.frequency.setTargetAtTime(mainPitch, t, 0.1);
      subOsc.frequency.setTargetAtTime(subPitch, t, 0.1);
      mainGain.gain.setTargetAtTime(vol, t, 0.1);
      subGain.gain.setTargetAtTime(vol * 1.5, t, 0.1);
    }

    const intensity = s / 150;
    const r = Math.round(intensity * 123);
    const g = Math.round(212 - intensity * 80);
    const b = 255;
    document.getElementById('speedDisplay').style.textShadow =
      `0 0 ${10 + intensity * 30}px rgba(${r},${g},${b},0.9)`;

    updateBars(s, mainPitch, subPitch);
  }

  /* ---- Wave bars ---- */
  const barContainer = document.getElementById('waveBars');
  const BAR_COUNT = 20;
  for (let i = 0; i < BAR_COUNT; i++) {
    const b = document.createElement('div');
    b.className = 'bar';
    b.style.height = '4px';
    barContainer.appendChild(b);
  }

  function updateBars(speed, mainHz, subHz) {
    const bars = barContainer.querySelectorAll('.bar');
    const base = speed <= 1 ? 2 : 4;
    bars.forEach((b, i) => {
      const norm = i / (BAR_COUNT - 1);
      const wave = Math.sin(norm * Math.PI * 3 + Date.now() / 200) * 0.5 + 0.5;
      const height = base + wave * (speed / 150) * 26;
      b.style.height = Math.max(2, height) + 'px';

      const t = norm;
      const rr = Math.round(t * 123);
      const gg = Math.round(212 + t * (47 - 212));
      const bb = 255;
      b.style.background = `rgb(${rr},${gg},${bb})`;
    });
  }

  /* ---- Oscilloscope ring canvas ---- */
  const canvas = document.getElementById('ringCanvas');
  const ctx = canvas.getContext('2d');
  const W = 220, H = 220, cx = W / 2, cy = H / 2, R = 90;
  let phase = 0;

  function drawRing() {
    ctx.clearRect(0, 0, W, H);
    const speed = parseFloat(document.getElementById('speedSlider').value) || 0;
    const norm = speed / 150;
    const freqMult = 1 + norm * 6;
    const amp = 3 + norm * 14;

    const grd = ctx.createRadialGradient(cx, cy, R - 12, cx, cy, R + 12);
    grd.addColorStop(0, `rgba(0,212,255,${0.05 + norm * 0.15})`);
    grd.addColorStop(0.4, `rgba(0,212,255,${0.25 + norm * 0.3})`);
    grd.addColorStop(1, 'rgba(0,212,255,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.strokeStyle = grd;
    ctx.lineWidth = 18;
    ctx.stroke();

    const STEPS = 200;
    ctx.beginPath();
    for (let i = 0; i <= STEPS; i++) {
      const angle = (i / STEPS) * Math.PI * 2;
      const wave = Math.sin(angle * freqMult + phase) * amp;
      const subWave = Math.sin(angle * freqMult * 0.5 + phase * 1.3) * amp * 0.4;
      const radius = R + wave + subWave;
      const x = cx + Math.cos(angle) * radius;
      const y = cy + Math.sin(angle) * radius;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();

    const lineR = Math.round(norm * 123);
    const lineG = Math.round(212 - norm * 165);
    const lineB = 255;
    ctx.strokeStyle = `rgba(${lineR},${lineG},${lineB},${0.6 + norm * 0.4})`;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = `rgb(${lineR},${lineG},${lineB})`;
    ctx.shadowBlur = 6 + norm * 10;
    ctx.stroke();
    ctx.shadowBlur = 0;

    phase += 0.04 + norm * 0.12;
    requestAnimationFrame(drawRing);
  }

  function animBars() {
    const speed = parseFloat(document.getElementById('speedSlider').value) || 0;
    const mainPitch = speed <= 1 ? 60 : 80 + speed * 3.5;
    const subPitch = speed <= 1 ? 30 : 40 + speed * 1.8;
    updateBars(speed, mainPitch, subPitch);
    requestAnimationFrame(animBars);
  }

  // Explicit listeners are more reliable than inline-only handlers in Android WebViews.
  document.getElementById('startBtn').addEventListener('click', initAudio, { passive: true });
  document.getElementById('speedSlider').addEventListener('input', function () {
    updateSpeed(this.value);
  }, { passive: true });

  // Restore sound after screen sleep, app switching, or browser interruption.
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && engineOn) unlockTabletAudio();
  });
  window.addEventListener('pageshow', () => {
    if (engineOn) unlockTabletAudio();
  });
  document.addEventListener('pointerdown', unlockTabletAudio, { passive: true });
  document.addEventListener('touchend', unlockTabletAudio, { passive: true });

  updateSpeed(0);
  drawRing();
  animBars();
</script>
</body>
</html>
