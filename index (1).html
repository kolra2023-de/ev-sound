<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>EV Sound Pro - Sci-Fi Edition</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#040608;--s1:#0a0d12;--s2:#0f141d;
  --border:#161d2a;--text:#eef2f7;--muted:#445566;
  --accent:#00d4ff;
}
html,body{height:100%;background:var(--bg);overflow:hidden}
body{color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;height:100dvh;-webkit-tap-highlight-color:transparent;user-select:none}

/* ── STATUSBAR ── */
.statusbar{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:10px 28px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0
}
.app-name{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;letter-spacing:.14em;color:var(--accent)}
.pills{display:flex;gap:8px}
.pill{display:flex;align-items:center;gap:5px;padding:4px 12px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:10px;border:1px solid;transition:all .3s}
.pill-gps{color:#4ade80;border-color:#4ade8030;background:#4ade8008}
.pill-gps.off{color:var(--muted);border-color:var(--border);background:transparent}
.pill-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.6s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* ── MAIN LAYOUT ── */
.main{flex:1;display:grid;grid-template-columns:320px 1fr;overflow:hidden;min-height:0}

/* ── LEFT PANEL ── */
.left{background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}

.speed-panel{padding:28px 24px 20px;border-bottom:1px solid var(--border);flex-shrink:0}
.speed-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.speed-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:16px}
.speed-big{font-family:'JetBrains Mono',monospace;font-size:88px;font-weight:600;line-height:1;transition:color .4s;min-width:3ch;letter-spacing:-.02em}
.speed-unit{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--muted);padding-bottom:16px}
.speed-src{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);padding-bottom:16px;margin-left:4px;letter-spacing:.06em}

.arc-wrap{width:100%;height:4px;background:var(--border);border-radius:2px;position:relative;margin-bottom:20px}
.arc-fill{height:100%;border-radius:2px;transition:width .5s ease,background .4s}
.arc-knob{width:12px;height:12px;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);transition:left .5s ease,background .4s,box-shadow .4s}

.gps-btn{width:100%;padding:15px 18px;border-radius:12px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px}
.gps-btn:active{transform:scale(.97)}
.gps-btn.active{background:#00d4ff12;border-color:#00d4ff40;color:#00d4ff}

.now-playing{padding:18px 24px;border-bottom:1px solid var(--border);flex-shrink:0;min-height:90px;display:flex;flex-direction:column;justify-content:center}
.np-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.np-name{font-size:16px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px;transition:color .3s}
.np-model{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted)}
.np-idle{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted)}

.np-wave{display:flex;align-items:center;gap:2px;height:20px;margin-top:8px}
.np-wb{width:3px;border-radius:1px;background:var(--muted);transition:background .3s}
.playing-active .np-wb{animation:wav .45s ease infinite}
@keyframes wav{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.2)}}

.vol-panel{padding:16px 24px 20px;margin-top:auto;border-top:1px solid var(--border);flex-shrink:0}
.vol-row{display:flex;align-items:center;gap:12px}
.vol-ico{font-size:18px;flex-shrink:0}
.vol-w{flex:1}
.vol-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:5px;letter-spacing:.12em;text-transform:uppercase}
input[type=range].vol{width:100%;-webkit-appearance:none;height:3px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
input[type=range].vol::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.1);cursor:pointer}
.vol-v{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text);min-width:36px;text-align:right}

/* ── RIGHT PANEL ── */
.right{overflow-y:auto;padding:20px 20px 20px;-webkit-overflow-scrolling:touch}
.right::-webkit-scrollbar{width:3px}
.right::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.list-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.24em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}

.scard{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;transition:border-color .25s,box-shadow .25s,transform .1s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.scard:active{transform:scale(.97)}
.scard.active{border-color:var(--cc);box-shadow:0 0 0 1px var(--cc),0 4px 24px #0008}
.scard.active::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top left,color-mix(in srgb,var(--cc) 8%,transparent),transparent 60%);pointer-events:none}
.scard.dimmed{opacity:.28}
.scard-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.brand-tag{padding:3px 9px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;letter-spacing:.08em;border:1px solid}
.scard-acts{display:flex;align-items:center;gap:6px}
.match-b{padding:2px 7px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:8px;background:rgba(74,222,128,.1);color:#4ade80;border:1px solid rgba(74,222,128,.25);display:none}
.match-b.on{display:block}
.play-btn{width:28px;height:28px;border-radius:50%;border:1px solid;background:transparent;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s}
.scard-name{font-size:13px;font-weight:700;letter-spacing:-.01em;margin-bottom:2px}
.scard-model{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:6px}
.scard-desc{font-size:10px;color:#4a6070;line-height:1.55;margin-bottom:9px}
.wave{display:flex;align-items:center;gap:2px;height:22px;margin-bottom:9px}
.wb{flex:1;border-radius:1px;transition:background .3s}
.scard.playing .wb{animation:wav .45s ease infinite}
.srange{display:flex;align-items:center;gap:6px}
.srl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);white-space:nowrap}
.srt{flex:1;height:2px;background:var(--border);border-radius:1px;position:relative}
.srf{height:100%;border-radius:1px;position:absolute;transition:width .4s}
.srd{width:6px;height:6px;border-radius:50%;position:absolute;top:50%;transform:translate(-50%,-50%);transition:left .4s}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-12px);background:#1a2230;border:1px solid var(--border);border-radius:10px;padding:9px 16px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text);letter-spacing:.04em;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="statusbar">
  <div class="app-name">🚀 SPACE EV SOUND PRO</div>
  <div class="pills">
    <div class="pill pill-gps off" id="gpsPill"><div class="pill-dot"></div>GPS</div>
  </div>
</div>

<div class="main">
  <div class="left">
    <div class="speed-panel">
      <div class="speed-lbl">현재 속도</div>
      <div class="speed-row">
        <div class="speed-big" id="spdNum">0</div>
        <div class="speed-unit">km/h</div>
        <div class="speed-src" id="spdSrc">대기 중</div>
      </div>
      <div class="arc-wrap">
        <div class="arc-fill" id="arcFill" style="width:0%;background:#00d4ff"></div>
        <div class="arc-knob" id="arcKnob" style="left:0%;background:#00d4ff;box-shadow:0 0 10px #00d4ff88"></div>
      </div>
      <button class="gps-btn" id="gpsBtn" onclick="toggleGPS()">
        <span id="gpsBtnIcon">📍</span>
        <span id="gpsBtnText">GPS 시작 — 탭해서 속도 연동</span>
      </button>
    </div>

    <div class="now-playing" id="nowPlaying">
      <div class="np-lbl">엔진 가동 중</div>
      <div class="np-idle" id="npIdle">우주선을 선택하세요 →</div>
      <div id="npInfo" style="display:none">
        <div class="np-name" id="npName">—</div>
        <div class="np-model" id="npModel">—</div>
        <div class="np-wave playing-active" id="npWave"></div>
      </div>
    </div>

    <div class="vol-panel">
      <div class="vol-lbl">출력 강도</div>
      <div class="vol-row">
        <div class="vol-ico" id="volIco">🔊</div>
        <div class="vol-w">
          <input type="range" class="vol" id="volSlider" min="0" max="100" value="70">
        </div>
        <div class="vol-v" id="volVal">70%</div>
      </div>
    </div>
  </div>

  <div class="right">
    <div class="list-lbl">엔진 사운드 — 출발 시 '윙~' 하는 SF 효과 적용</div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SOUNDS=[
  {id:1,brand:'TESLA',c:'#e82127',name:'Warp Model S',model:'Plaid Warp Drive',desc:'정지 상태에서 출발 시 웅장한 스웰(Swell)과 함께 고주파 휘닝이 폭발적으로 상승합니다.',smin:0,smax:200,char:'tesla',wave:[.3,.7,.9,1,.8,.95,.7,1,.9,.6,1,.8,.95,.7,.85,1,.6,.9]},
  {id:2,brand:'PORSCHE',c:'#c8aa78',name:'Taycan Nebula',model:'Sport Nebula Sound',desc:'낮게 깔리는 웅웅거림에서 출발과 동시에 날카로운 기계음 레이어가 겹쳐지며 상승합니다.',smin:0,smax:200,char:'porsche',wave:[.5,.7,.6,.85,.75,.9,.7,.8,.85,.7,.9,.75,.8,.7,.85,.75,.65,.8]},
  {id:3,brand:'AUDI',c:'#bb0a21',name:'e-tron Pulsar',model:'32-Sample Pulsar',desc:'복잡한 펄스음들이 합쳐져 우주선 엔진이 점화되는 듯한 다층적 사운드를 제공합니다.',smin:0,smax:200,char:'audi',wave:[.5,.65,.7,.8,.7,.85,.75,.8,.7,.75,.85,.7,.8,.75,.7,.8,.75,.7]},
  {id:4,brand:'BMW',c:'#1c69d4',name:'i4 Supernova',model:'Zimmer Supernova',desc:'한스 짐머의 SF 감성. 출발 시 신비로운 화음이 속도에 맞춰 거대한 파동으로 변합니다.',smin:0,smax:200,char:'bmw',wave:[.3,.5,.6,.7,.6,.75,.65,.7,.6,.7,.75,.65,.7,.6,.65,.7,.6,.65]},
];

// ── 오디오 엔진 ──────────────────────────────────────────────
let speed=0, playing=null, volume=.7;
let actx=null, gainMaster=null, currentChar=null;
let layers = []; 
let lfo = null;

function getCtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}

const CHAR_CONFIGS = {
  tesla: {
    layers: [
      {type:'sine', fm:1, v:0.6},
      {type:'sine', fm:2, v:0.3},
      {type:'sine', fm:4, v:0.15},
      {type:'sawtooth', fm:0.5, v:0.1}
    ],
    baseFreq: 120, topFreq: 2800,
    lfoFreq: 8, lfoDepth: 20,
    swell: 0.8
  },
  porsche: {
    layers: [
      {type:'sawtooth', fm:1, v:0.4},
      {type:'triangle', fm:0.5, v:0.7},
      {type:'sine', fm:1.5, v:0.3}
    ],
    baseFreq: 50, topFreq: 1200,
    lfoFreq: 4, lfoDepth: 10,
    swell: 1.2
  },
  audi: {
    layers: [
      {type:'square', fm:1, v:0.2},
      {type:'sawtooth', fm:1.01, v:0.2},
      {type:'triangle', fm:0.5, v:0.6}
    ],
    baseFreq: 70, topFreq: 1500,
    lfoFreq: 12, lfoDepth: 30,
    swell: 1.0
  },
  bmw: {
    layers: [
      {type:'sine', fm:1, v:0.5},
      {type:'sine', fm:1.5, v:0.3},
      {type:'sine', fm:0.75, v:0.4},
      {type:'sine', fm:2.25, v:0.2}
    ],
    baseFreq: 90, topFreq: 1000,
    lfoFreq: 2, lfoDepth: 5,
    swell: 1.5
  }
};

function playSound(s){
  const ctx = getCtx();
  const t = ctx.currentTime;
  const config = CHAR_CONFIGS[s.char];
  
  // 출발 시 '윙~' 하는 느낌을 위한 비선형 반응
  // 속도가 0에서 조금만 올라가도 소리가 확 살아나게 설정
  const ratio = speed === 0 ? 0 : Math.pow(speed / 200, 0.7); 
  const targetFreq = config.baseFreq + (config.topFreq - config.baseFreq) * ratio;

  if (currentChar === s.char && layers.length > 0) {
    layers.forEach(l => {
      l.osc.frequency.setTargetAtTime(targetFreq * l.fm, t, 0.15);
    });
    // 속도에 따른 LFO 속도 변화 (더 빠르게 회전하는 느낌)
    if (lfo) lfo.frequency.setTargetAtTime(config.lfoFreq + (speed/10), t, 0.2);
    
    // 볼륨 스웰: 정지 상태에서 출발 시 볼륨이 웅장하게 커짐
    const swellVol = speed === 0 ? 0.1 : Math.min(1.0, 0.3 + ratio * config.swell);
    gainMaster.gain.setTargetAtTime(volume * swellVol, t, 0.2);
    return;
  }

  stopAudio();
  currentChar = s.char;

  gainMaster = ctx.createGain();
  gainMaster.gain.setValueAtTime(0, t);
  gainMaster.gain.linearRampToValueAtTime(volume * 0.3, t + 0.5); // 초기 페이드인
  gainMaster.connect(ctx.destination);

  // LFO 생성 (진동 효과)
  lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  lfo.frequency.value = config.lfoFreq;
  lfoGain.gain.value = config.lfoDepth;
  lfo.connect(lfoGain);
  lfo.start();

  config.layers.forEach(lConfig => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = lConfig.type;
    osc.frequency.setValueAtTime(targetFreq * lConfig.fm, t);
    g.gain.value = lConfig.v;
    
    lfoGain.connect(osc.frequency); // 모든 레이어에 진동 효과 적용
    osc.connect(g);
    g.connect(gainMaster);
    osc.start();
    layers.push({osc, gain: g, fm: lConfig.fm});
  });
}

function stopAudio(){
  const ctx = getCtx();
  const t = ctx.currentTime;
  if (gainMaster) {
    gainMaster.gain.setTargetAtTime(0, t, 0.2);
    const oldGain = gainMaster;
    const oldLayers = [...layers];
    const oldLfo = lfo;
    setTimeout(() => {
      oldLayers.forEach(l => l.osc.stop());
      if (oldLfo) oldLfo.stop();
      oldGain.disconnect();
    }, 300);
  }
  layers = [];
  lfo = null;
  currentChar = null;
}

function updateVol(){
  if(gainMaster) gainMaster.gain.setTargetAtTime(volume * 0.5, getCtx().currentTime, 0.1);
}

// ── GPS ──────────────────────────────────────────────────────
let gpsWatch=null, gpsActive=false;
function toggleGPS(){
  if(gpsActive){ stopGPS(); return; }
  startGPS();
}

function startGPS(){
  const btn=document.getElementById('gpsBtn');
  document.getElementById('gpsBtnText').textContent='엔진 연결 중…';
  gpsWatch=navigator.geolocation.watchPosition(
    pos=>{
      gpsActive=true;
      const spd=pos.coords.speed!=null ? Math.round(pos.coords.speed*3.6) : 0;
      setSpeed(spd);
      btn.className='gps-btn active';
      document.getElementById('gpsBtnIcon').textContent='📡';
      document.getElementById('gpsBtnText').textContent='엔진 연동 중 — 탭하면 중지';
      document.getElementById('gpsPill').classList.remove('off');
      document.getElementById('spdSrc').textContent='GPS';
    },
    err=>{
      showToast('⚠️ GPS 오류');
      btn.className='gps-btn';
    },
    {enableHighAccuracy:true, maximumAge:500, timeout:12000}
  );
}

function stopGPS(){
  if(gpsWatch!=null){ navigator.geolocation.clearWatch(gpsWatch); gpsWatch=null; }
  gpsActive=false;
  setSpeed(0);
  document.getElementById('gpsBtnIcon').textContent='📍';
  document.getElementById('gpsBtnText').textContent='GPS 시작 — 탭해서 속도 연동';
  document.getElementById('gpsBtn').className='gps-btn';
  document.getElementById('gpsPill').classList.add('off');
  document.getElementById('spdSrc').textContent='대기 중';
}

function setSpeed(v){
  speed=Math.max(0, Math.min(300, v));
  document.getElementById('spdNum').textContent=speed;
  const col=speed>=100?'#f87171':speed>=1?'#00d4ff':'#445566';
  document.getElementById('spdNum').style.color=col;
  const pct=Math.min(speed/200*100, 100);
  document.getElementById('arcFill').style.cssText=`width:${pct}%;background:${col}`;
  document.getElementById('arcKnob').style.cssText=`left:${pct}%;background:${col};box-shadow:0 0 10px ${col}88`;

  if(playing){
    const s=SOUNDS.find(x=>x.id===playing);
    if(s) playSound(s);
  }
  render();
}

function render(){
  const g=document.getElementById('grid');
  g.innerHTML='';
  SOUNDS.forEach(s=>{
    const isP=playing===s.id;
    const card=document.createElement('div');
    card.className='scard'+(isP?' active playing':'');
    card.style.setProperty('--cc',s.c);
    const wH=s.wave.map((h,i)=>`<div class="wb" style="height:${Math.round(h*20)}px;background:${isP?s.c:'#1e2530'};animation-delay:${i*.04}s"></div>`).join('');
    card.innerHTML=`
      <div class="scard-top">
        <div class="brand-tag" style="color:${s.c};border-color:${s.c}40;background:${s.c}12">${s.brand}</div>
        <div class="scard-acts">
          <button class="play-btn" style="color:${s.c};border-color:${s.c}44">${isP?'⏹':'▶'}</button>
        </div>
      </div>
      <div class="scard-name">${s.name}</div>
      <div class="scard-model">${s.model}</div>
      <div class="scard-desc">${s.desc}</div>
      <div class="wave">${wH}</div>`;
    card.addEventListener('click',()=>{
      if(playing===s.id){
        playing=null; stopAudio(); updateNowPlaying(null);
      } else {
        playing=s.id; playSound(s); updateNowPlaying(s);
        showToast(s.name+' 엔진 점화');
      }
      render();
    });
    g.appendChild(card);
  });
}

function updateNowPlaying(s){
  const idle=document.getElementById('npIdle');
  const info=document.getElementById('npInfo');
  if(!s){ idle.style.display=''; info.style.display='none'; return; }
  idle.style.display='none';
  info.style.display='block';
  document.getElementById('npName').textContent=s.name;
  document.getElementById('npName').style.color=s.c;
  document.getElementById('npModel').textContent=s.brand+' · '+s.model;
  const wv=document.getElementById('npWave');
  wv.innerHTML=s.wave.slice(0,12).map(h=>`<div class="np-wb" style="height:${Math.round(h*18)}px;background:${s.c}"></div>`).join('');
}

document.getElementById('volSlider').addEventListener('input',function(){
  volume=this.value/100;
  document.getElementById('volVal').textContent=this.value+'%';
  updateVol();
});

let toastT=null;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'), 2500);
}

render();
</script>
</body>
</html>
