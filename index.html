<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#06080d">
<title>Future EV & Grand Exhaust Lab</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#06080d;--p:#0c121b;--p2:#111927;--line:#1d2a3a;--tx:#eef7ff;--mu:#73879b;--ac:#39d8ff;--ok:#4be39a}
html,body{height:100%;background:var(--bg)}
body{color:var(--tx);font-family:Inter,system-ui,sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;-webkit-tap-highlight-color:transparent;user-select:none}
button,input,.card{touch-action:manipulation}
header{height:48px;flex:0 0 auto;background:#080c12;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.logo{font:800 12px ui-monospace,monospace;letter-spacing:.12em;color:var(--ac)}
.badge{font:10px ui-monospace,monospace;color:var(--mu);border:1px solid var(--line);border-radius:999px;padding:5px 9px}
.badge.on{color:var(--ok);border-color:#4be39a55;background:#4be39a10}
.app{flex:1;min-height:0;display:grid;grid-template-columns:350px 1fr}
aside{background:var(--p);border-right:1px solid var(--line);overflow:auto}
section.ctrl{padding:16px;border-bottom:1px solid var(--line)}
.k{font:9px ui-monospace,monospace;letter-spacing:.18em;color:var(--mu);text-transform:uppercase;margin-bottom:7px}
.speedrow{display:flex;align-items:flex-end;gap:8px}
.speed{font:700 68px/1 ui-monospace,monospace;color:var(--ac);min-width:2.7ch}
.unit,.src{font:10px ui-monospace,monospace;color:var(--mu);padding-bottom:9px}
.src{margin-left:auto}
.meter{height:5px;background:var(--line);border-radius:999px;margin:13px 0 14px;overflow:hidden}
.meter>i{display:block;height:100%;width:10%;background:linear-gradient(90deg,#39d8ff,#7b6fff)}
.lab{display:flex;justify-content:space-between;font-size:11px;color:var(--mu);margin-bottom:7px}
input[type=range]{width:100%;appearance:none;height:4px;background:var(--line);border-radius:999px;outline:none}
input[type=range]::-webkit-slider-thumb{appearance:none;width:20px;height:20px;border-radius:50%;background:#fff}
.quick{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-top:9px}
.quick button,.nav button,.gps{border:1px solid var(--line);background:var(--p2);color:var(--tx);border-radius:9px;padding:8px 5px;font-size:10px}
.gps{width:100%;margin-top:11px;color:var(--ac);border-color:#39d8ff55;background:#39d8ff0d;font-weight:700}
.gps.on{color:var(--ok);border-color:#4be39a66;background:#4be39a10}
.modebox{margin-top:11px;border:1px solid var(--line);background:#ffffff05;border-radius:10px;padding:10px}
.modebox b{display:block;font-size:11px;margin-bottom:4px}
.modebox p{font-size:10px;color:var(--mu);line-height:1.5}
.notice{display:none;margin-top:9px;color:#ffd86b;border:1px solid #ffd86b44;background:#ffd86b0d;border-radius:8px;padding:8px;font-size:10px;line-height:1.5}
.now{min-height:130px}
.now h2{font-size:18px;line-height:1.25;margin-bottom:4px}
.meta{font:10px ui-monospace,monospace;color:var(--mu);line-height:1.5}
.wave{height:28px;display:flex;gap:3px;align-items:center;margin-top:9px}
.wave i{width:4px;border-radius:2px;background:var(--ac);animation:w .8s ease-in-out infinite alternate}
.wave.off i{animation:none;opacity:.3}
@keyframes w{from{transform:scaleY(.3)}to{transform:scaleY(1)}}
.nav{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:10px}
.stop{color:#ff9292!important;border-color:#ff929244!important}
main{min-width:0;min-height:0;display:flex;flex-direction:column}
.toolbar{padding:12px 14px;border-bottom:1px solid var(--line);background:#080c12}
.searchrow{display:flex;gap:8px;align-items:center}
.search{flex:1;background:var(--p);border:1px solid var(--line);color:var(--tx);border-radius:10px;padding:10px 12px;outline:none;user-select:text}
.count{font:10px ui-monospace,monospace;color:var(--mu)}
.tabs{display:flex;gap:7px;margin-top:9px}
.tab{flex:1;border:1px solid var(--line);background:var(--p);color:var(--mu);padding:9px;border-radius:9px;font-weight:800;font-size:11px}
.tab.active{color:#fff;border-color:#39d8ff66;background:#39d8ff14}
.tab[data-mode=exhaust].active{border-color:#ff985f66;background:#ff985f14}
.chips{display:flex;gap:6px;overflow-x:auto;padding-top:9px;scrollbar-width:none}
.chip{white-space:nowrap;border:1px solid var(--line);background:var(--p);color:var(--mu);padding:6px 9px;border-radius:999px;font-size:10px}
.chip.active{color:#fff;border-color:#39d8ff66;background:#39d8ff14}
.wrap{flex:1;min-height:0;overflow:auto;padding:13px 14px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(225px,1fr));gap:9px}
.card{position:relative;background:var(--p);border:1px solid var(--line);border-radius:13px;padding:12px;cursor:pointer;overflow:hidden}
.card.active{border-color:var(--c);box-shadow:0 0 0 1px var(--c),0 10px 30px #0008}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.tag{font:700 9px ui-monospace,monospace;border:1px solid;border-radius:6px;padding:3px 7px}
.play{width:29px;height:29px;border-radius:50%;border:1px solid;background:transparent;color:inherit}
.name{font-size:13px;font-weight:800;margin-bottom:4px}
.desc{font-size:10px;color:#657a90;line-height:1.5;min-height:30px}
.spec{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.spec span{font:8px ui-monospace,monospace;color:var(--mu);border:1px solid var(--line);border-radius:5px;padding:3px 6px;background:#ffffff05}
.mini{height:17px;display:flex;gap:2px;align-items:center;margin-top:8px}
.mini i{flex:1;max-width:8px;border-radius:2px;background:var(--c);opacity:.7}
.toast{position:fixed;top:56px;left:50%;transform:translate(-50%,-10px);opacity:0;transition:.2s;background:#17202d;border:1px solid #2b3a4e;border-radius:9px;padding:9px 14px;font:11px ui-monospace,monospace;z-index:99}
.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:920px){body{height:auto;min-height:100vh;overflow:auto}.app{display:flex;flex-direction:column}.wrap{overflow:visible}aside{border-right:0;border-bottom:1px solid var(--line)}}
@media(max-width:520px){.grid{grid-template-columns:1fr}.speed{font-size:58px}}
</style>
</head>
<body>
<header><div class="logo">✦ FUTURE EV + GRAND EXHAUST</div><div class="badge" id="audioBadge">AUDIO OFF</div></header>
<div class="app">
<aside>
<section class="ctrl">
<div class="k">미리듣기 속도</div>
<div class="speedrow"><div class="speed" id="speed">15</div><div class="unit">km/h</div><div class="src" id="src">SIMULATION</div></div>
<div class="meter"><i id="meter"></i></div>
<div class="lab"><span>속도</span><b id="speedText">15 km/h</b></div>
<input id="speedRange" type="range" min="0" max="160" value="15">
<div class="quick">
<button data-v="0">0</button><button data-v="10">10</button><button data-v="20">20</button>
<button data-v="30">30</button><button data-v="60">60</button><button data-v="100">100</button>
</div>
<div class="modebox"><b id="modeTitle">전기차 저속 경고음</b><p id="modeDesc">저속에서는 또렷하고, 고속으로 갈수록 자동으로 작아집니다.</p></div>
<button class="gps" id="gpsBtn">📍 GPS 실제 속도 연결</button>
<div class="notice" id="notice"></div>
</section>
<section class="ctrl now">
<div class="k">현재 재생</div>
<h2 id="nowName">사운드를 선택하세요</h2>
<div class="meta" id="nowMeta">카드를 누르면 바로 재생됩니다.</div>
<div class="wave off" id="wave"></div>
<div class="nav"><button id="prev">◀ 이전</button><button class="stop" id="stop">■ 정지</button><button id="next">다음 ▶</button></div>
</section>
<section class="ctrl">
<div class="lab"><span>볼륨</span><b id="volText">40%</b></div>
<input id="volRange" type="range" min="0" max="100" value="40">
<div class="meta" style="margin-top:9px">블루투스 안전 튜닝 적용: 초저역·과도한 왜곡·중복 재생을 억제했습니다.</div>
</section>
</aside>
<main>
<div class="toolbar">
<div class="searchrow"><input class="search" id="search" placeholder="사운드 검색"><div class="count" id="count"></div></div>
<div class="tabs"><button class="tab active" data-mode="ev">미래형 전기차 100</button><button class="tab" data-mode="exhaust">웅장한 배기음 20</button></div>
<div class="chips" id="chips"></div>
</div>
<div class="wrap"><div class="grid" id="grid"></div></div>
</main>
</div>
<div class="toast" id="toast"></div>
<script>
'use strict';

const EV=[
['glass','글래스','#48dfff','맑고 투명한 미래형 톤',110,980,1700,6200,.55,.78,1.0,[['sine',1,.55],['sine',2,.12],['triangle',.5,.10]]],
['velvet','벨벳','#aa8cff','부드럽고 고급스러운 저중음',50,520,1000,3600,.72,.86,3.0,[['sine',1,.55],['sine',.5,.24],['triangle',1.5,.09]]],
['deep','딥 코어','#ffbf5b','묵직하고 안정적인 저역 중심',34,390,720,2600,.92,.94,5.0,[['sine',.5,.40],['sine',.25,.24],['triangle',1,.18]]],
['aero','에어로','#70bfff','바람처럼 넓고 매끄러운 상승음',125,1120,2200,6900,.44,.74,.5,[['sine',1,.38],['sine',1.012,.28],['triangle',2,.06]]],
['halo','헤일로','#7d86ff','부드러운 화음이 겹치는 공간감',88,820,1550,5200,1.05,.82,1.5,[['sine',1,.38],['sine',1.5,.20],['sine',2.25,.09]]],
['neon','네온','#ff6dcf','밝고 매끄러운 도심형 휘닝',135,1380,2400,7600,.62,.70,.2,[['sine',1,.43],['triangle',2,.12],['sine',3,.06]]],
['prism','프리즘','#72f0cf','여러 화음이 자연스럽게 섞이는 톤',98,900,1800,5900,.85,.79,1.0,[['sine',1,.40],['sine',1.25,.17],['sine',1.75,.11]]],
['cloud','클라우드','#e4efff','공기처럼 잔잔하고 넓은 톤',78,700,1400,4800,.40,.88,1.8,[['sine',1,.42],['sine',.99,.27],['triangle',.5,.10]]],
['quantum','퀀텀','#53e3ff','정밀하고 깨끗한 전동음',145,1500,2700,8200,.75,.67,0,[['sine',1,.46],['sine',2.01,.10],['triangle',.5,.08]]],
['nova','노바','#ff8e73','낮은 중심음에서 넓게 퍼지는 톤',62,650,1200,4300,1.0,.84,3.8,[['sine',.5,.31],['sine',1,.40],['sine',1.5,.12]]]
];

const EX=[
['v8','그랜드 V8','#ff995e','깊고 넓은 저음의 웅장한 배기음',38,190,420,1600,.9,.82,7,18,[['sawtooth',1,.27],['triangle',.5,.34],['sine',.25,.22]]],
['v12','로열 V12','#ffd166','부드럽게 올라가는 다기통 배기음',52,260,650,2400,.75,.78,5.2,13,[['sawtooth',1,.22],['triangle',1.5,.22],['sine',.5,.26]]],
['darkgt','다크 GT','#d38cff','어둡고 묵직한 GT형 배기음',32,165,360,1350,1.05,.86,8,22,[['sawtooth',.5,.25],['triangle',1,.31],['sine',.25,.28]]],
['turbine','터빈 GT','#6fc7ff','배기음과 터빈 휘닝의 혼합',46,230,520,2100,.7,.76,4.5,11,[['triangle',1,.32],['sine',2,.16],['sine',.5,.24]]]
];

const V10=['SOFT','FLOW','LUX','NOIR','AURA','GLIDE','DEEP','WIDE','SIGNATURE','MAX'];
const V5=['SOFT','DEEP','WIDE','SPORT','MAX'];
const P=[];
EV.forEach((f,fi)=>{for(let i=0;i<10;i++)P.push({
id:fi*10+i+1,mode:'ev',family:f[0],familyLabel:f[1],color:f[2],desc:f[3],
name:f[1]+' '+V10[i],base:Math.round(f[4]*(.92+i*.017)),top:Math.round(f[5]*(.86+i*.03)),
cut0:Math.round(f[6]*(.92+i*.015)),cut1:Math.round(f[7]*(.9+i*.022)),
q:f[8]+(i-4.5)*.02,curve:f[9]+(i%5-2)*.02,bass:f[10]+i*.15,drive:0,
layers:f[11].map((x,j)=>({type:x[0],ratio:x[1]*(1+(i-4.5)*.0017*(j+1)),gain:x[2]}))
})});
EX.forEach((f,fi)=>{for(let i=0;i<5;i++)P.push({
id:101+fi*5+i,mode:'exhaust',family:f[0],familyLabel:f[1],color:f[2],desc:f[3],
name:f[1]+' '+V5[i],base:Math.round(f[4]*(.94+i*.025)),top:Math.round(f[5]*(.9+i*.045)),
cut0:Math.round(f[6]*(.94+i*.02)),cut1:Math.round(f[7]*(.92+i*.035)),
q:f[8]+(i-2)*.04,curve:f[9]-i*.02,bass:f[10]+i*.6,drive:f[11]+i*2.2,
layers:f[12].map((x,j)=>({type:x[0],ratio:x[1]*(1+(i-2)*.006*(j+1)),gain:x[2]}))
})});

let mode='ev',family='all',selected=null,speed=15,volume=.4;
let ctx=null,master=null,bass=null,highpass=null,filter=null,preGain=null,comp=null,shape=null,nodes=[],gps=null,gpsOn=false,timer=null;
const $=id=>document.getElementById(id);

function toast(s){$('toast').textContent=s;$('toast').classList.add('show');clearTimeout(timer);timer=setTimeout(()=>$('toast').classList.remove('show'),1800)}
function ac(){const C=window.AudioContext||window.webkitAudioContext;if(!C)throw new Error('Web Audio 미지원');if(!ctx)ctx=new C({latencyHint:'playback'});if(ctx.state==='suspended')ctx.resume().catch(()=>{});return ctx}
function curve(a){const n=1024,c=new Float32Array(n);for(let i=0;i<n;i++){const x=i*2/n-1;c[i]=(1+a)*x/(1+a*Math.abs(x))}return c}
function evGain(v){if(v<=20)return 1;if(v>=80)return .02;return Math.pow(1-(v-20)/60,1.5)*.98+.02}
function exGain(v){return .35+Math.min(1,v/160)*.65}
function pitch(p){const m=p.mode==='ev'?100:160,r=Math.min(1,speed/m);return p.base+(p.top-p.base)*Math.pow(r,p.curve)}
function target(p){return volume*(p.mode==='ev'?evGain(speed):exGain(speed))*(p.mode==='ev'?.18:.13)}

function releaseVoice(fade=.035){
 if(!ctx)return;
 const t=ctx.currentTime,oldNodes=nodes.slice(),oldGraph=[bass,highpass,filter,shape,preGain,comp,master];
 if(master){try{master.gain.cancelScheduledValues(t);master.gain.setTargetAtTime(0,t,fade)}catch(e){}}
 nodes=[];master=bass=highpass=filter=preGain=comp=shape=null;
 setTimeout(()=>{
  oldNodes.forEach(n=>{try{n.stop&&n.stop();n.disconnect&&n.disconnect()}catch(e){}});
  oldGraph.forEach(n=>{try{n&&n.disconnect()}catch(e){}})
 },Math.max(160,fade*1000*7));
}
function stop(update=true){
 if(ctx)releaseVoice(.035);
 selected=null;$('audioBadge').classList.remove('on');$('audioBadge').textContent='AUDIO OFF';
 if(update){updateNow();render()}
}
function play(id){
 const p=P.find(x=>x.id===id);if(!p)return;
 const c=ac(),t=c.currentTime;
 if(selected===id&&nodes.length){updateAudio();return}
 if(master||nodes.length)releaseVoice(.025);
 selected=id;nodes=[];
 master=c.createGain();bass=c.createBiquadFilter();highpass=c.createBiquadFilter();filter=c.createBiquadFilter();preGain=c.createGain();comp=c.createDynamicsCompressor();
 bass.type='lowshelf';highpass.type='highpass';filter.type='lowpass';
 comp.threshold.value=-22;comp.knee.value=24;comp.ratio.value=10;comp.attack.value=.004;comp.release.value=.20;
 bass.connect(highpass);highpass.connect(filter);
 if(p.mode==='exhaust'){
  shape=c.createWaveShaper();shape.curve=curve(Math.min(8,p.drive*.32));shape.oversample='4x';filter.connect(shape);shape.connect(preGain)
 }else{shape=null;filter.connect(preGain)}
 preGain.connect(comp);comp.connect(master);master.connect(c.destination);
 const r=Math.min(1,speed/(p.mode==='ev'?100:160)),f=pitch(p);
 bass.frequency.value=100;bass.gain.value=Math.min(p.bass,p.mode==='exhaust'?6:4.5);
 highpass.frequency.value=p.mode==='exhaust'?42:32;highpass.Q.value=.7;
 filter.frequency.value=Math.min(p.cut0+(p.cut1-p.cut0)*r,p.mode==='exhaust'?2300:6800);filter.Q.value=Math.min(p.q,1.1);
 preGain.gain.value=p.mode==='exhaust'?.46:.66;
 master.gain.value=0;master.gain.linearRampToValueAtTime(target(p),t+.16);
 const drift=c.createOscillator(),dg=c.createGain();drift.type='sine';drift.frequency.value=p.mode==='ev'?.08:.14;dg.gain.value=p.mode==='ev'?.75:1.15;drift.connect(dg);drift.start();nodes.push(drift,dg);
 const total=p.layers.reduce((a,b)=>a+b.gain,0)||1;
 p.layers.forEach((l,i)=>{const o=c.createOscillator(),g=c.createGain();o.type=l.type;o.frequency.value=f*l.ratio;o.detune.value=(i-1)*1.5;g.gain.value=(l.gain/total)*.58;dg.connect(o.frequency);o.connect(g);g.connect(bass);o.start();nodes.push(o,g)});
 $('audioBadge').classList.add('on');$('audioBadge').textContent='AUDIO ON · BT SAFE';updateNow();render();toast(p.name)
}
function updateAudio(){
 if(!ctx||!selected||!nodes.length||!master||!filter)return;
 const p=P.find(x=>x.id===selected),t=ctx.currentTime,f=pitch(p);
 const oscillators=nodes.filter(n=>n&&n.frequency&&typeof n.start==='function');
 oscillators.forEach((o,i)=>{if(i===0)o.frequency.setTargetAtTime(p.mode==='ev'?.08:.14,t,.12);else{const l=p.layers[i-1];if(l)o.frequency.setTargetAtTime(f*l.ratio,t,.12)}});
 const r=Math.min(1,speed/(p.mode==='ev'?100:160));
 filter.frequency.setTargetAtTime(Math.min(p.cut0+(p.cut1-p.cut0)*r,p.mode==='exhaust'?2300:6800),t,.12);
 master.gain.cancelScheduledValues(t);master.gain.setTargetAtTime(target(p),t,.10)
}
function setSpeed(v,src='SIMULATION'){speed=Math.max(0,Math.min(200,Math.round(+v||0)));$('speed').textContent=speed;$('speedText').textContent=speed+' km/h';$('speedRange').value=Math.min(160,speed);$('src').textContent=src;$('meter').style.width=Math.min(100,speed/160*100)+'%';updateAudio()}
function list(){const q=$('search').value.trim().toLowerCase();return P.filter(p=>p.mode===mode&&(family==='all'||p.family===family)&&(!q||(p.name+' '+p.desc+' '+p.familyLabel).toLowerCase().includes(q)))}
function renderChips(){
 const defs=mode==='ev'?EV:EX;const arr=[['all','전체'],...defs.map(x=>[x[0],x[1]])];
 $('chips').innerHTML=arr.map(x=>`<button class="chip ${family===x[0]?'active':''}" data-f="${x[0]}">${x[1]}</button>`).join('');
 document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{family=b.dataset.f;renderChips();render()})
}
function mini(p){return Array.from({length:15},(_,i)=>`<i style="height:${5+Math.abs(Math.sin((i+1)*(p.id%7+2)))*12}px"></i>`).join('')}
function render(){
 const a=list();$('count').textContent=`${a.length} SOUNDS`;
 $('grid').innerHTML=a.map(p=>`<article class="card ${selected===p.id?'active':''}" data-id="${p.id}" style="--c:${p.color}">
 <div class="top"><span class="tag" style="color:${p.color};border-color:${p.color}66">${p.familyLabel}</span><button class="play" style="color:${p.color};border-color:${p.color}66">${selected===p.id?'■':'▶'}</button></div>
 <div class="name">${String(p.id).padStart(3,'0')} · ${p.name}</div><div class="desc">${p.desc}</div>
 <div class="spec"><span>${p.base}-${p.top} Hz</span><span>BASS +${p.bass.toFixed(1)}dB</span><span>${p.mode==='ev'?'저속 강조':'가속 강조'}</span></div>
 <div class="mini">${mini(p)}</div></article>`).join('');
 document.querySelectorAll('.card').forEach(c=>c.onclick=()=>{const id=+c.dataset.id;selected===id?stop():play(id)})
}
function updateNow(){
 const p=P.find(x=>x.id===selected),w=$('wave');
 if(!p){$('nowName').textContent='사운드를 선택하세요';$('nowMeta').textContent='카드를 누르면 바로 재생됩니다.';w.classList.add('off');w.innerHTML=Array.from({length:18},(_,i)=>`<i style="height:${6+(i%5)*3}px"></i>`).join('');return}
 $('nowName').textContent=p.name;$('nowName').style.color=p.color;$('nowMeta').textContent=`${p.familyLabel} · ${p.base}-${p.top} Hz · ${p.mode==='ev'?'고속 페이드아웃':'가속 시 웅장함 증가'}`;w.classList.remove('off');w.innerHTML=Array.from({length:18},(_,i)=>`<i style="height:${8+Math.abs(Math.sin((i+1)*(p.id%5+2)))*18}px;background:${p.color}"></i>`).join('')
}
function changeMode(m){
 mode=m;family='all';document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
 $('modeTitle').textContent=m==='ev'?'전기차 저속 경고음':'웅장한 배기음 미리듣기';
 $('modeDesc').textContent=m==='ev'?'저속에서는 또렷하고, 고속으로 갈수록 자동으로 작아집니다.':'속도가 높아질수록 회전감과 웅장함이 강해집니다.';
 if(selected&&P.find(x=>x.id===selected)?.mode!==m)stop();
 renderChips();render()
}
function move(d){const a=list();if(!a.length)return;let i=a.findIndex(x=>x.id===selected);if(i<0)i=d>0?-1:0;i=(i+d+a.length)%a.length;play(a[i].id);document.querySelector(`.card[data-id="${a[i].id}"]`)?.scrollIntoView({behavior:'smooth',block:'center'})}
function showNotice(s){$('notice').textContent=s;$('notice').style.display=s?'block':'none'}
function stopGPS(){if(gps!==null)navigator.geolocation.clearWatch(gps);gps=null;gpsOn=false;$('gpsBtn').classList.remove('on');$('gpsBtn').textContent='📍 GPS 실제 속도 연결';$('speedRange').disabled=false;showNotice('')}
function startGPS(){
 ac();if(!window.isSecureContext){showNotice('GPS는 HTTPS GitHub Pages 주소에서만 작동합니다.');return}
 if(!navigator.geolocation){showNotice('현재 브라우저는 위치 기능을 지원하지 않습니다.');return}
 $('gpsBtn').textContent='⏳ GPS 연결 중…';
 gps=navigator.geolocation.watchPosition(p=>{gpsOn=true;const v=Number.isFinite(p.coords.speed)&&p.coords.speed>0?p.coords.speed*3.6:0;setSpeed(v,'GPS');$('gpsBtn').classList.add('on');$('gpsBtn').textContent='📡 GPS 연동 중 · 탭하면 중지';$('speedRange').disabled=true;showNotice('')},
 e=>{showNotice(e.code===1?'위치 권한을 허용해 주세요.':'GPS 신호를 확인할 수 없습니다.');stopGPS()},
 {enableHighAccuracy:true,maximumAge:800,timeout:15000})
}

$('speedRange').oninput=e=>{if(!gpsOn)setSpeed(e.target.value)};
document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>gpsOn?toast('GPS를 먼저 중지하세요'):setSpeed(b.dataset.v));
$('volRange').oninput=e=>{volume=+e.target.value/100;$('volText').textContent=e.target.value+'%';updateAudio()};
$('gpsBtn').onclick=()=>gpsOn?stopGPS():startGPS();
$('prev').onclick=()=>move(-1);$('next').onclick=()=>move(1);$('stop').onclick=()=>stop();
$('search').oninput=render;
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>changeMode(b.dataset.mode));
['pointerdown','touchstart','click'].forEach(ev=>document.addEventListener(ev,()=>{if(ctx&&ctx.state==='suspended')ctx.resume().catch(()=>{})},{passive:true}));
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&ctx&&ctx.state==='suspended')ctx.resume().catch(()=>{})});

setSpeed(15);renderChips();render();updateNow();toast('전기차 100개 + 배기음 20개 준비 완료');
</script>
</body>
