<script id="worklet-code" type="text/plain">
class EVPhysicalSynth extends AudioWorkletProcessor {
  constructor(){
    super();
    this.profile=null; this.active=false;
    this.speed=0; this.speedTarget=0; this.load=.35; this.loadTarget=.35; this.listener=0; this.listenerTarget=0;
    this.ph=new Float64Array(24); this.noiseLP=0; this.noiseSlow=0; this.noiseRLP=0; this.noiseRSlow=0;
    this.seed=0x12345678; this.lastSpeed=0; this.accel=0; this.master=0; this.masterTarget=0;
    this.port.onmessage=e=>{
      const d=e.data||{};
      if(d.type==='profile'){this.profile=d.profile;this.active=true;this.masterTarget=1}
      if(d.type==='state'){
        if(Number.isFinite(d.speed))this.speedTarget=Math.max(0,Math.min(220,d.speed));
        if(Number.isFinite(d.load))this.loadTarget=Math.max(0,Math.min(1,d.load));
        if(Number.isFinite(d.listener))this.listenerTarget=d.listener?1:0;
      }
      if(d.type==='active'){this.active=!!d.value;this.masterTarget=this.active?1:0}
    };
  }
  rnd(){let x=this.seed|0;x^=x<<13;x^=x>>>17;x^=x<<5;this.seed=x|0;return (x>>>0)/4294967295*2-1}
  adv(i,hz){let p=this.ph[i]+6.283185307179586*Math.max(0,hz)/sampleRate;if(p>6.283185307179586)p-=6.283185307179586*Math.floor(p/6.283185307179586);this.ph[i]=p;return p}
  clamp(x,a,b){return x<a?a:x>b?b:x}
  smoothstep(a,b,x){const t=this.clamp((x-a)/(b-a),0,1);return t*t*(3-2*t)}
  soft(x){return Math.tanh(x*1.28)*.78}
  evSample(p,speed,load,listener){
    const v=Math.max(0,speed), n=this.clamp(v/180,0,1);
    const wheelHz=(v/3.6)/Math.max(1.7,p.wheelCirc);
    const mechHz=wheelHz*p.finalDrive;
    const elecHz=Math.max(0.15,mechHz*p.polePairs*p.pitchScale);
    const moving=this.smoothstep(.3,5,v);
    const torque=.12+.88*Math.pow(load,.68);
    const ripple=Math.sin(this.adv(20,Math.max(.18,mechHz*p.rippleOrder)))*p.fmDepth*(.25+.75*load);
    let motor=0, dual=0;
    for(let j=0;j<p.orders.length&&j<5;j++){
      const o=p.orders[j], hz=elecHz*o[0]*(1+ripple);
      if(hz<sampleRate*.43){
        const ph=this.adv(j,hz);
        motor+=o[1]*(Math.sin(ph)+p.roughness*.24*Math.sin(ph*2.01+.7));
        if(p.dualDetune){const ph2=this.adv(5+j,hz*(1+p.dualDetune*(.45+.55*load)));dual+=o[1]*Math.sin(ph2+.18)}
      }
    }
    const motorEnv=p.motorGain*moving*(.10+.90*Math.pow(n,.52))*torque;
    motor*=motorEnv;
    dual*=motorEnv*p.dualGain;

    const gearHz=this.clamp(mechHz*p.gearOrder,28,4800);
    const gph=this.adv(10,gearHz);
    const gear=(Math.sin(gph)+.28*Math.sin(gph*2.02+.3)+.09*Math.sin(gph*3.01))*p.gearGain*moving*Math.pow(n,.58)*(.3+.7*load);

    const sideHz=Math.max(.2,elecHz*p.sideOrder);
    const side=.55+.45*Math.sin(this.adv(11,sideHz));
    const carrierHz=this.clamp(p.carrier*(.96+.07*n+.025*load),1800,sampleRate*.41);
    const carrier=Math.sin(this.adv(12,carrierHz))*side*p.carrierGain*moving*(.2+.8*load)*(.48+.47*listener);

    const cut=p.avasCut;
    const avFade=1-this.smoothstep(cut-6,cut+8,v);
    const avBase=p.avasBase+v*p.avasSlope;
    let avas=0;
    for(let j=0;j<p.avasIntervals.length&&j<3;j++){
      const ph=this.adv(13+j,avBase*p.avasIntervals[j]);
      let s=Math.sin(ph);
      if(p.avasWave==='pulse')s=Math.tanh(1.55*(Math.sin(ph)+.35*Math.sin(ph*3)));
      else if(p.avasWave==='crystal')s=Math.sin(ph)+.16*Math.sin(ph*3.02)+.07*Math.sin(ph*5.01);
      else if(p.avasWave==='turbine')s=Math.sin(ph)*(.72+.28*Math.sin(this.adv(21+j,.22+j*.07)));
      else if(p.avasWave==='hum')s=.86*Math.sin(ph)+.22*Math.sin(ph*.5+.4);
      avas+=s*(j===0?.68:j===1?.24:.12);
    }
    avas*=p.avasGain*avFade*(.64+.86*listener)*(.72+.28*(1-load));

    const bodyHz=p.bodyHz+Math.min(48,mechHz*.08);
    const body=Math.sin(this.adv(18,bodyHz))*p.bodyGain*moving*Math.pow(n,.72)*(1.0-.58*listener);

    const wL=this.rnd(),wR=this.rnd();
    this.noiseLP+=.055*(wL-this.noiseLP);this.noiseSlow+=.009*(wL-this.noiseSlow);
    this.noiseRLP+=.051*(wR-this.noiseRLP);this.noiseRSlow+=.008*(wR-this.noiseRSlow);
    const roadL=(this.noiseLP-this.noiseSlow)*p.roadGain*Math.pow(n,1.08)*(1.15-.70*listener);
    const roadR=(this.noiseRLP-this.noiseRSlow)*p.roadGain*Math.pow(n,1.08)*(1.15-.70*listener);
    const windL=(wL-this.noiseLP)*p.windGain*Math.pow(n,1.72)*(.68+.32*listener);
    const windR=(wR-this.noiseRLP)*p.windGain*Math.pow(n,1.72)*(.68+.32*listener);

    const mono=motor+gear+carrier+avas+body+dual*.5;
    const spread=p.stereoWidth;
    return [mono+dual*spread+roadL+windL,mono-dual*spread+roadR+windR];
  }
  exhaustSample(p,speed,load,listener){
    const n=this.clamp(speed/180,0,1);
    const rpm=p.idle+(p.redline-p.idle)*Math.pow(n,.82)+load*260;
    const fire=rpm/60*p.cylinders/2;
    const beat=Math.sin(this.adv(20,fire*.5))*p.irregularity;
    let pulse=0;
    const hs=p.harmonics;
    for(let i=0;i<hs.length&&i<6;i++){const ph=this.adv(i,fire*hs[i][0]*(1+beat*.006));pulse+=hs[i][1]*Math.sin(ph+i*.21)}
    const rumblePh=this.adv(8,Math.max(22,fire*.25));
    const rumble=(Math.sin(rumblePh)+.35*Math.sin(rumblePh*2.03))*p.rumble;
    const w=this.rnd();this.noiseLP+=.045*(w-this.noiseLP);
    const exhaustNoise=this.noiseLP*p.noise*(.25+.75*load);
    const turbo=Math.sin(this.adv(12,this.clamp(1400+n*p.turboSweep,1200,sampleRate*.4)))*p.turboGain*n*load;
    const env=(.16+.84*Math.pow(n,.55))*(.28+.72*Math.pow(load,.7));
    const mono=(pulse*p.pulseGain+rumble+exhaustNoise)*env+turbo;
    return [mono*(.92+.16*listener),mono*(.92+.11*listener)];
  }
  process(inputs,outputs){
    const out=outputs[0],L=out[0],R=out[1]||out[0];
    const ks=1-Math.exp(-1/(sampleRate*.095)),kl=1-Math.exp(-1/(sampleRate*.075)),km=1-Math.exp(-1/(sampleRate*.030));
    for(let i=0;i<L.length;i++){
      this.speed+=(this.speedTarget-this.speed)*ks;this.load+=(this.loadTarget-this.load)*kl;this.listener+=(this.listenerTarget-this.listener)*kl;
      this.master+=(this.masterTarget-this.master)*km;
      let lr=[0,0];
      if(this.profile&&this.master>.0001)lr=this.profile.kind==='exhaust'?this.exhaustSample(this.profile,this.speed,this.load,this.listener):this.evSample(this.profile,this.speed,this.load,this.listener);
      L[i]=this.soft(lr[0]*this.master);R[i]=this.soft(lr[1]*this.master);
    }
    return true;
  }
}
registerProcessor('ev-physical-synth',EVPhysicalSynth);
</script>

function toast(s){$('toast').textContent=s;$('toast').classList.add('show');clearTimeout(timer);timer=setTimeout(()=>$('toast').classList.remove('show'),1800)}
async function ensureAudio(){
  const C=window.AudioContext||window.webkitAudioContext;if(!C)throw new Error('이 브라우저는 Web Audio를 지원하지 않습니다.');
  if(!ctx){
    ctx=new C({latencyHint:'playback'});
    if(!ctx.audioWorklet)throw new Error('AudioWorklet 미지원 브라우저입니다. 최신 Chrome 또는 Safari를 사용해 주세요.');
    const code=$('worklet-code').textContent;const url=URL.createObjectURL(new Blob([code],{type:'application/javascript'}));
    await ctx.audioWorklet.addModule(url);URL.revokeObjectURL(url);
    worklet=new AudioWorkletNode(ctx,'ev-physical-synth',{numberOfInputs:0,numberOfOutputs:1,outputChannelCount:[2]});
    hp=ctx.createBiquadFilter();lp=ctx.createBiquadFilter();comp=ctx.createDynamicsCompressor();master=ctx.createGain();
    hp.type='highpass';hp.frequency.value=38;hp.Q.value=.68;lp.type='lowpass';lp.frequency.value=12000;lp.Q.value=.65;
    comp.threshold.value=-18;comp.knee.value=18;comp.ratio.value=5.5;comp.attack.value=.004;comp.release.value=.16;master.gain.value=0;
    worklet.connect(hp);hp.connect(lp);lp.connect(comp);comp.connect(master);master.connect(ctx.destination);
  }
  if(ctx.state==='suspended')await ctx.resume();
}
function outputTarget(){return volume*(mode==='ev'?.72:.64)}
async function play(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  try{await ensureAudio()}catch(e){showNotice(e.message);return}
  const token=++switchToken;selected=id;updateNow();render();
  const t=ctx.currentTime;master.gain.cancelScheduledValues(t);master.gain.setTargetAtTime(0,t,.018);
  setTimeout(()=>{if(token!==switchToken||!worklet)return;worklet.port.postMessage({type:'profile',profile:p});worklet.port.postMessage({type:'state',speed,load,listener:listener==='exterior'?1:0});const now=ctx.currentTime;master.gain.cancelScheduledValues(now);master.gain.setTargetAtTime(outputTarget(),now,.045)},55);
  $('audioBadge').classList.add('on');$('audioBadge').textContent='AUDIO ON · PHYSICAL';toast(p.name)
}

function renderChips(){const arr=chipDefs();$('chips').innerHTML=arr.map(x=>`<button class="chip ${family===x[0]?'active':''}" data-f="${x[0]}">${x[1]}</button>`).join('');document.querySelectorAll('.chip').forEach(b=>b.onclick=()=>{family=b.dataset.f;renderChips();render()})}
function mini(p){return Array.from({length:15},(_,i)=>`<i style="height:${5+Math.abs(Math.sin((i+1)*(p.id%9+2)))*12}px"></i>`).join('')}
function render(){const a=list();$('count').textContent=`${a.length} SOUNDS`;$('grid').innerHTML=a.map(p=>`<article class="card ${selected===p.id?'active':''}" data-id="${p.id}" style="--c:${p.color}"><div class="top"><span class="tag" style="color:${p.color};border-color:${p.color}66">${p.mode==='ev'?p.cat:p.familyLabel}</span><button class="play" style="color:${p.color};border-color:${p.color}66">${selected===p.id?'■':'▶'}</button></div><div class="name">${String(p.id).padStart(3,'0')} · ${p.name}</div><div class="desc">${p.desc}</div><div class="spec">${p.mode==='ev'?`<span>${p.topology}</span><span>${p.polePairs} POLE PAIRS</span><span>PWM ${Math.round(p.carrier/100)/10}k</span>`:`<span>${p.cylinders} CYL</span><span>${p.idle}-${p.redline} RPM</span><span>${p.driveMode}</span>`}</div><div class="mini">${mini(p)}</div></article>`).join('');document.querySelectorAll('.card').forEach(c=>c.onclick=()=>{const id=+c.dataset.id;selected===id?stop():play(id)})}
function updateNow(){const p=P.find(x=>x.id===selected),w=$('wave');if(!p){$('nowName').textContent='사운드를 선택하세요';$('nowName').style.color='';$('nowMeta').textContent='카드를 누르면 물리 합성 엔진이 시작됩니다.';w.classList.add('off');w.innerHTML=Array.from({length:18},(_,i)=>`<i style="height:${6+(i%5)*3}px"></i>`).join('');return}$('nowName').textContent=p.name;$('nowName').style.color=p.color;$('nowMeta').textContent=p.mode==='ev'?`${p.cat} · ${p.topology} · ${p.polePairs}극쌍 · 감속비 ${p.finalDrive.toFixed(1)} · ${p.driveMode}`:`${p.cylinders}기통 · ${p.idle}-${p.redline} rpm · ${p.driveMode}`;w.classList.remove('off');w.innerHTML=Array.from({length:18},(_,i)=>`<i style="height:${8+Math.abs(Math.sin((i+1)*(p.id%7+2)))*18}px;background:${p.color}"></i>`).join('')}
function changeMode(m){mode=m;family='all';document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));$('modeTitle').textContent=m==='ev'?'실차 기반 전기차 합성':'다기통 배기 펄스 합성';$('modeDesc').textContent=m==='ev'?'속도·부하에 따라 모터 전기주파수, 감속기, PWM, AVAS, 노면음이 각각 다르게 변합니다.':'차속에 따른 회전수와 기통별 점화 주파수, 맥동, 터보 휘슬을 합성합니다.';if(selected&&P.find(x=>x.id===selected)?.mode!==m)stop();renderChips();render()}
function move(d){const a=list();if(!a.length)return;let i=a.findIndex(x=>x.id===selected);if(i<0)i=d>0?-1:0;i=(i+d+a.length)%a.length;play(a[i].id);document.querySelector(`.card[data-id="${a[i].id}"]`)?.scrollIntoView({behavior:'smooth',block:'center'})}
function showNotice(s){$('notice').textContent=s;$('notice').style.display=s?'block':'none'}
function stopGPS(){if(gps!==null)navigator.geolocation.clearWatch(gps);gps=null;gpsOn=false;$('gpsBtn').classList.remove('on');$('gpsBtn').textContent='📍 GPS 실제 속도';$('speedRange').disabled=false;showNotice('')}
async function startGPS(){try{await ensureAudio()}catch(e){showNotice(e.message);return}if(!window.isSecureContext){showNotice('GPS는 HTTPS GitHub Pages 주소에서만 작동합니다.');return}if(!navigator.geolocation){showNotice('현재 브라우저는 위치 기능을 지원하지 않습니다.');return}$('gpsBtn').textContent='⏳ GPS 연결 중…';gps=navigator.geolocation.watchPosition(p=>{gpsOn=true;const v=Number.isFinite(p.coords.speed)&&p.coords.speed>0?p.coords.speed*3.6:0;setSpeed(v,'GPS');$('gpsBtn').classList.add('on');$('gpsBtn').textContent='📡 GPS 연동 중';$('speedRange').disabled=true;showNotice('')},e=>{showNotice(e.code===1?'위치 권한을 허용해 주세요.':'GPS 신호를 확인할 수 없습니다.');stopGPS()},{enableHighAccuracy:true,maximumAge:800,timeout:15000})}
function stopDemo(){if(demoRaf)cancelAnimationFrame(demoRaf);demoRaf=0;$('demoBtn').classList.remove('on');$('demoBtn').textContent='▶ 가속 시연'}
function startDemo(){if(gpsOn){toast('GPS를 먼저 중지하세요');return}if(!selected){toast('사운드를 먼저 선택하세요');return}if(demoRaf){stopDemo();return}demoStart=performance.now();$('demoBtn').classList.add('on');$('demoBtn').textContent='■ 시연 중지';const step=now=>{const t=(now-demoStart)/1000;let v,l;if(t<8){const x=t/8;v=140*x*x*(3-2*x);l=.32+.62*Math.sin(Math.PI*x)}else if(t<12){const x=(t-8)/4;v=140-(115*x*x*(3-2*x));l=.22}else{stopDemo();setSpeed(25);setLoad(.25);return}setSpeed(v,'DEMO');setLoad(l);demoRaf=requestAnimationFrame(step)};demoRaf=requestAnimationFrame(step)}

$('speedRange').oninput=e=>{if(!gpsOn){stopDemo();setSpeed(e.target.value)}};document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>gpsOn?toast('GPS를 먼저 중지하세요'):(stopDemo(),setSpeed(b.dataset.v)));
$('loadRange').oninput=e=>{stopDemo();setLoad(+e.target.value/100)};$('volRange').oninput=e=>{volume=+e.target.value/100;$('volText').textContent=e.target.value+'%';updateAudio()};
document.querySelectorAll('.listen button').forEach(b=>b.onclick=()=>{listener=b.dataset.listen;document.querySelectorAll('.listen button').forEach(x=>x.classList.toggle('active',x===b));updateAudio();toast(listener==='cabin'?'차량 실내 청취':'차량 외부 청취')});
$('gpsBtn').onclick=()=>gpsOn?stopGPS():startGPS();$('demoBtn').onclick=startDemo;$('prev').onclick=()=>move(-1);$('next').onclick=()=>move(1);$('stop').onclick=()=>stop();$('search').oninput=render;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>changeMode(b.dataset.mode));
['pointerdown','touchstart','click'].forEach(ev=>document.addEventListener(ev,()=>{if(ctx&&ctx.state==='suspended')ctx.resume().catch(()=>{})},{passive:true}));document.addEventListener('visibilitychange',()=>{if(!document.hidden&&ctx&&ctx.state==='suspended')ctx.resume().catch(()=>{})});
setSpeed(15);setLoad(.35);renderChips();render();updateNow();toast('물리 합성 전기차 100개 준비 완료');
</script>
</body>
</html>
